<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Госы: тренажер памяти</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0c1222;
      --panel: #121a30;
      --panel-2: #182342;
      --line: #2a3a66;
      --text: #edf3ff;
      --muted: #98a8d3;
      --green: #41d39a;
      --red: #ff6d8d;
      --blue: #61a9ff;
      --yellow: #ffbf52;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(97,169,255,.14), transparent 28%),
        radial-gradient(circle at top right, rgba(65,211,154,.10), transparent 24%),
        var(--bg);
      color: var(--text);
    }
    .app {
      width: min(1440px, calc(100% - 28px));
      margin: 18px auto 28px;
      display: grid;
      grid-template-columns: 290px 1fr;
      gap: 16px;
    }
    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border: 1px solid rgba(124,152,219,.18);
      border-radius: 16px;
      box-shadow: 0 16px 36px rgba(0,0,0,.24);
    }
    .sidebar {
      padding: 16px;
      position: sticky;
      top: 18px;
      align-self: start;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
    }
    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    .block-list {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }
    .block-btn {
      width: 100%;
      border: 1px solid rgba(124,152,219,.18);
      background: rgba(255,255,255,.02);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      text-align: left;
      cursor: pointer;
    }
    .block-btn.active {
      background: rgba(97,169,255,.12);
      border-color: rgba(97,169,255,.45);
    }
    .block-btn .title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .block-btn .meta {
      font-size: 12px;
      color: var(--muted);
    }
    .side-actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }
    .ghost-btn, .primary-btn {
      border-radius: 12px;
      border: 1px solid rgba(124,152,219,.18);
      padding: 11px 12px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
    }
    .ghost-btn { background: rgba(255,255,255,.03); }
    .primary-btn { background: rgba(65,211,154,.14); }
    .content {
      padding: 18px;
    }
    .head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 16px;
    }
    .head h2 {
      margin: 0;
      font-size: 26px;
    }
    .head .note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(124,152,219,.14);
      background: rgba(255,255,255,.02);
    }
    .stat .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat .value {
      font-size: 22px;
      font-weight: 800;
    }
    .questions {
      display: grid;
      gap: 14px;
    }
    .input-card {
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(124,152,219,.14);
      background: rgba(255,255,255,.02);
      margin-bottom: 14px;
    }
    .input-card.good { border-color: rgba(65,211,154,.42); }
    .input-card.bad { border-color: rgba(255,109,141,.42); }
    .input-label {
      font-size: 18px;
      line-height: 1.42;
      margin-bottom: 10px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
      flex-wrap: wrap;
    }
    .cmd-input {
      flex: 1 1 420px;
      min-width: 0;
      background: rgba(8,12,24,.85);
      color: var(--text);
      border: 1px solid rgba(124,152,219,.18);
      border-radius: 12px;
      padding: 12px 13px;
      font-size: 14px;
      font-family: Consolas, ui-monospace, monospace;
    }
    .cmd-check {
      border: 1px solid rgba(124,152,219,.18);
      background: rgba(97,169,255,.14);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
    }
    .question {
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(124,152,219,.14);
      background: rgba(255,255,255,.02);
    }
    .question.done-good { border-color: rgba(65,211,154,.42); }
    .question.done-bad { border-color: rgba(255,109,141,.42); }
    .q-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      align-items: center;
    }
    .q-num {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge {
      font-size: 11px;
      color: #dce7ff;
      background: rgba(97,169,255,.14);
      border: 1px solid rgba(97,169,255,.28);
      padding: 5px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .q-text {
      font-size: 18px;
      line-height: 1.42;
      margin-bottom: 12px;
    }
    .options {
      display: grid;
      gap: 8px;
    }
    .option {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(124,152,219,.16);
      background: rgba(255,255,255,.02);
      color: var(--text);
      padding: 12px 13px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1.45;
    }
    .option:hover { background: rgba(255,255,255,.04); }
    .option.correct {
      border-color: rgba(65,211,154,.5);
      background: rgba(65,211,154,.13);
    }
    .option.wrong {
      border-color: rgba(255,109,141,.5);
      background: rgba(255,109,141,.12);
    }
    .feedback {
      margin-top: 10px;
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
    }
    .feedback.good { color: var(--green); }
    .feedback.bad { color: var(--red); }
    .question-mode-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(124,152,219,.14);
      background: rgba(255,255,255,.02);
    }
    .question-mode-meta {
      color: var(--muted);
      font-size: 13px;
    }
    .question-mode-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .question-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(124,152,219,.18);
      background: rgba(255,255,255,.03);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }
    .question-toggle input {
      margin: 0;
      accent-color: var(--blue);
    }
    .mode-btn {
      border: 1px solid rgba(124,152,219,.18);
      background: rgba(255,255,255,.03);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 13px;
    }
    .mode-btn.active {
      background: rgba(97,169,255,.14);
      border-color: rgba(97,169,255,.42);
    }
    .success-sticker {
      display: grid;
      justify-items: center;
      gap: 14px;
      padding: 20px 18px 24px;
      border-radius: 18px;
      border: 1px solid rgba(65,211,154,.36);
      background: linear-gradient(180deg, rgba(65,211,154,.16), rgba(255,255,255,.03));
      text-align: center;
    }
    .success-sticker__title {
      font-size: 22px;
      font-weight: 800;
      color: var(--green);
    }
    .success-sticker__text {
      max-width: 480px;
      color: var(--muted);
      line-height: 1.5;
    }
    .success-sticker img {
      width: min(280px, 100%);
      height: auto;
      border-radius: 18px;
      box-shadow: 0 16px 34px rgba(0,0,0,.28);
    }
    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }
    @media (max-width: 760px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .head { flex-direction: column; }
      h1 { font-size: 24px; }
      .head h2 { font-size: 22px; }
      .q-text { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel sidebar">
      <h1>Госы</h1>
      <div class="sub">Одна страница, блоки по очереди, быстрый проклик. Где в заметках были только ответы, формулировки я достроил сам.</div>
      <div class="block-list" id="blockList"></div>
      <div class="side-actions">
        <button class="ghost-btn" id="resetBlockBtn">Сбросить блок</button>
        <button class="ghost-btn" id="resetAllBtn">Сбросить все</button>
        <button class="primary-btn" id="nextBlockBtn">Следующий блок</button>
      </div>
    </aside>

    <main class="panel content">
      <div class="head">
        <div>
          <h2 id="blockTitle"></h2>
          <div class="note" id="blockNote"></div>
        </div>
      </div>
      <div class="stats" id="stats"></div>
      <div class="questions" id="questions"></div>
    </main>
  </div>

              "Для обозначения неизвестных слов вне словаря",
              "Для подсчета длины предложений",
              "Для нормализации регистра"
            ],
            correct: 1
          },
          {
            text: "В чем разница между `texts_to_sequences` и `texts_to_matrix`?",
            source: "generated",
            options: [
              "Оба возвращают одно и то же",
              "`texts_to_sequences` возвращает индексы токенов, а `texts_to_matrix` — матрицу признаков",
              "Первый работает только с русским текстом",
              "Второй возвращает только списки строк"
            ],
            correct: 1
          },
          {
            text: "Что делает SpatialDropout1D в NLP/CNN-задачах?",
            source: "generated",
            options: [
              "Случайно удаляет отдельные буквы",
              "Случайно обнуляет целые каналы признаков",
              "Сортирует токены по частоте",
              "Удлиняет последовательность"
            ],
            correct: 1
          },
          {
            text: "Что возвращает RNN/LSTM при `return_sequences=True`?",
            source: "generated",
            options: [
              "Только последнее скрытое состояние",
              "Полную последовательность скрытых состояний по всем шагам",
              "Только attention weights",
              "Только embedding-матрицу"
            ],
            correct: 1
          },
          {
            text: "Какую задачу решает модель Seq2Seq с attention?",
            source: "notes",
            options: [
              "Сортировку массива",
              "Преобразование одной последовательности в другую, например перевод",
              "Только кластеризацию текстов",
              "Только подсчет TF-IDF"
            ],
            correct: 1
          },
          {
            text: "Что обычно делает stemming?",
            source: "generated",
            options: [
              "Переводит текст в другой язык",
              "Приводит слова к основе, отрезая окончания",
              "Строит эмбеддинги",
              "Удаляет все существительные"
            ],
            correct: 1
          }
        ]
      },
      {
        id: "java",
        title: "Java",
        note: "Пять базовых по Word и два аккуратно добавленных допа.",
        questions: [
          {
            text: "Какой примитивный тип в Java хранит логические значения `true/false`?",
            source: "generated",
            options: ["bool", "boolean", "bit", "logical"],
            correct: 1
          },
          {
            text: "Какая точка входа в обычное Java-приложение?",
            source: "generated",
            options: ["start()", "run()", "main()", "init()"],
            correct: 2
          },
          {
            text: "Чему равно выражение `5 % 2` в Java?",
            source: "generated",
            options: ["0", "1", "2", "2.5"],
            correct: 1
          },
          {
            text: "Какой оператор означает логическое ИЛИ в Java?",
            source: "generated",
            options: ["&&", "|", "||", "!!"],
            correct: 2
          },
          {
            text: "Что делает `super()` в конструкторе наследника?",
            source: "generated",
            options: [
              "Удаляет родительский объект",
              "Вызывает конструктор суперкласса",
              "Делает метод статическим",
              "Создает интерфейс"
            ],
            correct: 1
          },
          {
            text: "Какое ключевое слово запрещает наследование класса в Java?",
            source: "generated",
            options: ["fixed", "sealed", "const", "final"],
            correct: 3
          },
          {
            text: "Какой тип коллекции в Java не допускает дубликаты элементов?",
            source: "generated",
            options: ["List", "Queue", "Set", "ArrayList"],
            correct: 2
          }
        ]
      }
    ];

    const storageKey = "gos-memory-quiz-v1";
    const commandAnswer = 'curl.exe -d "привет" http://ex.boberchik.com.ru/x';
    let currentBlockId = quizData[0].id;
    let state = loadState();
    let optionOrders = {};
    let transientCommandState = {};
    let questionViewMode = "single";
    let questionCursorByBlock = {};
    let showQuestionTexts = false;

    function loadState() {
      try {
        const raw = localStorage.getItem(storageKey);
        const parsed = raw ? JSON.parse(raw) : {};
        Object.values(parsed).forEach((blockState) => {
          if (blockState && typeof blockState === "object" && "__command" in blockState) {
            delete blockState.__command;
          }
        });
        return parsed;
      } catch {
        return {};
      }
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function ensureBlockState(blockId) {
      if (!state[blockId]) {
        state[blockId] = {};
      }
      return state[blockId];
    }

    function getBlock(blockId) {
      return quizData.find((block) => block.id === blockId);
    }

    function getBlockScore(block) {
      const blockState = ensureBlockState(block.id);
      let correct = 0;
      let answered = 0;
      block.questions.forEach((_, index) => {
        const answer = blockState[index];
        if (!answer) return;
        answered += 1;
        if (answer.correct) correct += 1;
      });
      return { correct, answered, total: block.questions.length };
    }

    function isBlockPerfect(block) {
      const score = getBlockScore(block);
      const cmdState = transientCommandState[block.id];
      return Boolean(
        cmdState?.correct &&
        score.total > 0 &&
        score.answered === score.total &&
        score.correct === score.total
      );
    }

    function getQuestionCursor(blockId, total) {
      if (!(blockId in questionCursorByBlock)) {
        questionCursorByBlock[blockId] = 0;
      }
      questionCursorByBlock[blockId] = Math.max(0, Math.min(questionCursorByBlock[blockId], Math.max(0, total - 1)));
      return questionCursorByBlock[blockId];
    }

    function shouldShowQuestionText(block, qIndex) {
      if (showQuestionTexts) {
        return true;
      }
      return qIndex >= Math.max(0, block.questions.length - 2);
    }

    function renderBlockList() {
      const root = document.getElementById("blockList");
      root.innerHTML = quizData.map((block) => {
        const score = getBlockScore(block);
        return `
          <button class="block-btn ${block.id === currentBlockId ? "active" : ""}" data-block-id="${block.id}">
            <div class="title">${block.title}</div>
            <div class="meta">${score.correct}/${score.total} верно, ${score.answered}/${score.total} отвечено</div>
          </button>
        `;
      }).join("");

      root.querySelectorAll(".block-btn").forEach((button) => {
        button.addEventListener("click", () => {
          currentBlockId = button.dataset.blockId;
          render();
        });
      });
    }

    function renderStats(block) {
      const score = getBlockScore(block);
      const generatedCount = block.questions.filter((q) => q.source === "generated").length;
      document.getElementById("stats").innerHTML = [
        stat("Верно", score.correct),
        stat("Отвечено", `${score.answered}/${score.total}`),
        stat("Осталось", score.total - score.answered),
        stat("Достроено мной", generatedCount)
      ].join("");
    }

    function stat(label, value) {
      return `<div class="stat"><div class="label">${label}</div><div class="value">${value}</div></div>`;
    }

    function shuffleArray(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getQuestionOrder(blockId, qIndex, options) {
      if (!optionOrders[blockId]) {
        optionOrders[blockId] = {};
      }
      if (!optionOrders[blockId][qIndex]) {
        optionOrders[blockId][qIndex] = shuffleArray(options.map((_, index) => index));
      }
      return optionOrders[blockId][qIndex];
    }

    function getBalancedOptionText(question, option, optionIndex, qIndex) {
      if (optionIndex === question.correct) {
        return option;
      }

      if (option.length <= 18) {
        return option;
      }

      const variants = [
        (text) => text,
        (text) => text.replace(/^Какую\s/i, "Какая "),
        (text) => text.replace(/^Какая\s/i, "Какую "),
        (text) => text.replace(/^Статическую\s/i, "Типизацию статическую "),
        (text) => text.replace(/^Функциональную\s/i, "Функциональную модель "),
        (text) => text.replace(/^Многопоточность\s/i, "Подход с многопоточностью "),
        (text) => text.replace(/^Динамическое\s/i, "Динамический подход "),
      ];

      const mode = Math.floor(Date.now() / 1200);
      const variantIndex = (mode + qIndex + optionIndex) % variants.length;
      return variants[variantIndex](option) || option;
    }

    function equalizeOptionHeights(root) {
      root.querySelectorAll(".options").forEach((optionsNode) => {
        const buttons = [...optionsNode.querySelectorAll(".option")];
        buttons.forEach((button) => {
          button.style.minHeight = "";
        });
        const maxHeight = buttons.reduce((max, button) => Math.max(max, button.offsetHeight), 0);
        if (!maxHeight) return;
        buttons.forEach((button) => {
          button.style.minHeight = `${maxHeight}px`;
        });
      });
    }

    function renderQuestions(block) {
      const blockState = ensureBlockState(block.id);
      const root = document.getElementById("questions");
      const cmdState = transientCommandState[block.id] || null;
      const questionCursor = getQuestionCursor(block.id, block.questions.length);
      const visibleQuestions =
        questionViewMode === "single"
          ? block.questions.map((question, qIndex) => ({ question, qIndex })).filter(({ qIndex }) => qIndex === questionCursor)
          : block.questions.map((question, qIndex) => ({ question, qIndex }));
      const questionModeHint = showQuestionTexts
        ? "Формулировки показаны."
        : "Формулировки скрыты, кроме последних двух вопросов.";
      const successSticker = isBlockPerfect(block) ? `
        <section class="success-sticker">
          <div class="success-sticker__title">Идеально. Все решено правильно.</div>
          <div class="success-sticker__text">Блок закрыт без ошибок. Можно спокойно переходить дальше.</div>
          <img src="success-sticker.png" alt="Стикер за идеальный результат">
        </section>
      ` : "";
      root.innerHTML = `
        <section class="question-mode-bar">
          <div class="question-mode-meta">
            ${questionViewMode === "single" ? `Сейчас показывается вопрос ${questionCursor + 1} из ${block.questions.length}` : `Сейчас показываются все вопросы блока: ${block.questions.length}`} ${questionModeHint}
          </div>
          <div class="question-mode-actions">
            <label class="question-toggle">
              <input type="checkbox" id="toggleQuestionTexts" ${showQuestionTexts ? "checked" : ""}>
              <span>Подставить вопросы</span>
            </label>
            <button class="mode-btn ${questionViewMode === "single" ? "active" : ""}" id="singleModeBtn">По одному</button>
            <button class="mode-btn ${questionViewMode === "all" ? "active" : ""}" id="allModeBtn">Все сразу</button>
            ${questionViewMode === "single" ? `<button class="mode-btn" id="prevQuestionBtn">Назад</button><button class="mode-btn" id="nextQuestionBtn">Дальше</button>` : ""}
          </div>
        </section>
        <section class="input-card ${cmdState ? (cmdState.correct ? "good" : "bad") : ""}">
          <div class="q-top">
            <div class="q-num">Практика</div>
            <div class="badge">ввод руками</div>
          </div>
          <div class="input-label">Введи команду, которая отправит в GPT слово <b>привет</b> через твой endpoint.</div>
          <div class="input-row">
            <input class="cmd-input" id="commandInput" name="command_no_memory_${block.id}" placeholder='Введите' value="${cmdState ? escapeAttr(cmdState.value) : ""}" autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false">
            <button class="cmd-check" id="checkCommandBtn">Проверить</button>
          </div>
          <div class="feedback ${cmdState ? (cmdState.correct ? "good" : "bad") : ""}" id="commandFeedback">
            ${cmdState ? (cmdState.correct ? "Да, это правильная команда." : escapeHtml(getCommandHint(cmdState.value))) : ""}
          </div>
        </section>
      ` + visibleQuestions.map(({ question, qIndex }) => {
        const saved = blockState[qIndex];
        const doneClass = saved ? (saved.correct ? "done-good" : "done-bad") : "";
        const badge = question.source === "notes" ? "по заметкам" : question.source === "generated" ? "достроено" : "";
        const optionOrder = getQuestionOrder(block.id, qIndex, question.options);
        const showText = shouldShowQuestionText(block, qIndex);
        return `
          <section class="question ${doneClass}">
            <div class="q-top">
              <div class="q-num">Вопрос ${qIndex + 1}</div>
              ${badge ? `<div class="badge">${badge}</div>` : ""}
            </div>
            ${showText ? `<div class="q-text">${escapeHtml(question.text)}</div>` : ""}
            <div class="options">
              ${optionOrder.map((originalIndex) => {
                const option = question.options[originalIndex];
                const optionText = getBalancedOptionText(question, option, originalIndex, qIndex);
                const isCorrect = originalIndex === question.correct;
                const wasClicked = saved && (saved.selectedText === option || saved.selected === originalIndex);
                let cls = "";
                if (saved) {
                  if (isCorrect) cls = "correct";
                  if (wasClicked && !saved.correct) cls = "wrong";
                }
                return `<button class="option ${cls}" data-question-index="${qIndex}" data-option-index="${originalIndex}">${escapeHtml(optionText)}</button>`;
              }).join("")}
            </div>
            <div class="feedback ${saved ? (saved.correct ? "good" : "bad") : ""}">
              ${saved ? (saved.correct ? "Да, это правильный ответ." : `Мимо. Правильный ответ: ${escapeHtml(question.options[question.correct])}`) : ""}
            </div>
          </section>
        `;
      }).join("") + successSticker;

      const input = document.getElementById("commandInput");
      const checkBtn = document.getElementById("checkCommandBtn");
      const toggleQuestionTexts = document.getElementById("toggleQuestionTexts");
      const singleModeBtn = document.getElementById("singleModeBtn");
      const allModeBtn = document.getElementById("allModeBtn");
      const prevQuestionBtn = document.getElementById("prevQuestionBtn");
      const nextQuestionBtn = document.getElementById("nextQuestionBtn");
      const check = () => {
        const value = input.value.trim();
        const correct = isCommandCorrect(value);
        transientCommandState[block.id] = { value, correct };
        render();
      };
      toggleQuestionTexts.addEventListener("change", () => {
        showQuestionTexts = toggleQuestionTexts.checked;
        render();
      });
      singleModeBtn.addEventListener("click", () => {
        questionViewMode = "single";
        render();
      });
      allModeBtn.addEventListener("click", () => {
        questionViewMode = "all";
        render();
      });
      if (prevQuestionBtn) {
        prevQuestionBtn.addEventListener("click", () => {
          questionCursorByBlock[block.id] = Math.max(0, getQuestionCursor(block.id, block.questions.length) - 1);
          render();
        });
      }
      if (nextQuestionBtn) {
        nextQuestionBtn.addEventListener("click", () => {
          questionCursorByBlock[block.id] = Math.min(block.questions.length - 1, getQuestionCursor(block.id, block.questions.length) + 1);
          render();
        });
      }
      checkBtn.addEventListener("click", check);
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          check();
        }
      });

      root.querySelectorAll(".option").forEach((button) => {
        button.addEventListener("click", () => {
          const qIndex = Number(button.dataset.questionIndex);
          const optIndex = Number(button.dataset.optionIndex);
          const q = block.questions[qIndex];
          ensureBlockState(block.id)[qIndex] = {
            selected: optIndex,
            selectedText: q.options[optIndex],
            correct: optIndex === q.correct
          };
          saveState();
          if (questionViewMode === "single" && qIndex < block.questions.length - 1) {
            questionCursorByBlock[block.id] = qIndex + 1;
          }
          render();
        });
      });

      equalizeOptionHeights(root);
    }

    function normalizeCommand(text) {
      return text
        .toLowerCase()
        .replace(/\s+/g, " ")
        .replace(/'/g, '"')
        .trim();
    }

    function isCommandCorrect(text) {
      const normalized = normalizeCommand(text);
      return (
        normalized.includes("curl.exe") &&
        normalized.includes('-d "привет"') &&
        normalized.includes("http://ex.boberchik.com.ru/x")
      );
    }

    function getCommandHint(text) {
      const normalized = normalizeCommand(text);
      const misses = [];

      if (!normalized.includes("curl.exe")) {
        misses.push("начало команды");
      }
      if (!normalized.includes('-d "привет"')) {
        misses.push("часть с текстом запроса");
      }
      if (!normalized.includes("http://ex.boberchik.com.ru/x")) {
        misses.push("адрес endpoint");
      }

      if (!misses.length) {
        return "Очень близко. Проверь пробелы, кавычки и порядок частей команды.";
      }

      if (misses.length === 1) {
        return "Почти. Проверь " + misses[0] + ".";
      }

      return "Почти. Сверь вот эти части: " + misses.join(", ") + ".";
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function escapeAttr(text) {
      return escapeHtml(text);
    }

    function render() {
      const block = getBlock(currentBlockId);
      document.getElementById("blockTitle").textContent = block.title;
      document.getElementById("blockNote").textContent = block.note;
      renderBlockList();
      renderStats(block);
      renderQuestions(block);
    }

    document.getElementById("resetBlockBtn").addEventListener("click", () => {
      state[currentBlockId] = {};
      delete optionOrders[currentBlockId];
      delete transientCommandState[currentBlockId];
      questionCursorByBlock[currentBlockId] = 0;
      saveState();
      render();
    });

    document.getElementById("resetAllBtn").addEventListener("click", () => {
      state = {};
      optionOrders = {};
      transientCommandState = {};
      questionCursorByBlock = {};
      saveState();
      render();
    });

    document.getElementById("nextBlockBtn").addEventListener("click", () => {
      const currentIndex = quizData.findIndex((block) => block.id === currentBlockId);
      const nextIndex = (currentIndex + 1) % quizData.length;
      currentBlockId = quizData[nextIndex].id;
      render();
    });

    render();
  </script>
